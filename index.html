<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driving Simulation Phase</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #videoContainer {
            position: relative;
            width: 80%;
            max-width: 1000px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        #statusBar {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="videoContainer">
        <video id="simulationPlayer" controls autoplay></video>
    </div>
    <div id="statusBar">Loading clip sequence...</div>

    <script>
        // 1. Parse group ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const groupID = urlParams.get('group') || "1";

        // 2. Google Drive streaming URLs
        function driveURL(id) {
            return `https://drive.google.com/uc?export=download&id=${id}`;
        }

        const unfaithfulPool = [
            driveURL("1lBolPxj0naQ6EpZX8YN3OPNKVmkFD4mf"), // clip1_unfaithful
            driveURL("12f1sK4ISp2Fk9ESo1T0YtkBjUj5MdLME"), // clip2_unfaithful
            driveURL("1uqnNUgofWkRQLU5JbQoeVRZAmLGEpDpY"), // clip3_unfaithful
            driveURL("1mSEkcDeYi8EpR7Y-pUVc2PqWi0fMAmh-"), // clip4_unfaithful
            driveURL("1nsPdnCOabTdWIw_8rfXPR0wytzQK1UAC"), // clip5_unfaithful
            driveURL("1PhDqKSaP5joyqWYHqo2Gc82eY0uXZjyH"), // clip6_unfaithful
            driveURL("1_1S4NOTAFUs3YVYEHtLOxYs-gYF9JTJ0"), // clip7_unfaithful
            driveURL("1BKHckPSzGETivAwchAOUYB2ocZGziHAu"), // clip8_unfaithful
            driveURL("1XOVy1CMjCD9amtXPj0lVBnBjWj_trDkc"), // clip9_unfaithful
            driveURL("16xFWsmgYiNAjGuvUq_8nXLSvfRidvG7H")  // clip10_unfaithful
        ];

        const faithfulPool = [
            driveURL("1AnxolUWBeR0mPeAsVejZCrJPPoUjmsq1"), // clip1_faithful
            driveURL("1TphWA59UA8uAAjirJmoR2_rxKK3Llm_O"), // clip2_faithful
            driveURL("1XrBqpQiCaDNDgjGLOM4gxDUgpGcLWmoh"), // clip3_faithful
            driveURL("1teKN8Q79fiw92bbY3CF-JVSWkrx6RwmW"), // clip4_faithful
            driveURL("1tKyrGiQtjOgv8gorYBrwyuq4G_8nfER_"), // clip5_faithful
            driveURL("1qI05N-wBY0ek75Y50v725U82VTTv0g8y"), // clip6_faithful
            driveURL("1a85R8w3PW6iLbONUVkRpGs7LXlbzXj3p"), // clip7_faithful
            driveURL("1_DsEW14o8DoKEX1Mk_o82rdisJjlWwLc"), // clip8_faithful
            driveURL("1DEzWq03Tmws0t1WFmeidGxe-ZJCTJYnL"), // clip9_faithful
            driveURL("1C1g92rz-HlGaauvL8T1UhTAmTNLJ4n3k")  // clip10_faithful
        ];

        // 3. Group unfaithful counts
        const unfaithfulCounts = {
            "1": 0,
            "2": 1,
            "3": 2,
            "4": 3,
            "5": 4,
            "6": 5,
            "7": 6,
            "8": 7,
            "9": 8,
            "10": 9,
            "11": 10
        };

        const unfaithfulCount = unfaithfulCounts[groupID] !== undefined
            ? unfaithfulCounts[groupID]
            : 0;

        // 4. Fisher-Yates shuffle
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 5. Randomly pick which videos are unfaithful
        const shuffledUnfaithful = shuffle([...unfaithfulPool]);
        const shuffledFaithful = shuffle([...faithfulPool]);

        const selectedUnfaithful = shuffledUnfaithful.slice(0, unfaithfulCount);
        const selectedFaithful = shuffledFaithful.slice(0, 10 - unfaithfulCount);

        // 6. If group has unfaithful videos, force one to start first
        let shuffledPlaylist;
        if (selectedUnfaithful.length > 0) {
            const firstUnfaithful = selectedUnfaithful[0];
            const rest = shuffle([...selectedFaithful, ...selectedUnfaithful.slice(1)]);
            shuffledPlaylist = [firstUnfaithful, ...rest];
        } else {
            shuffledPlaylist = shuffle([...selectedFaithful]);
        }

        // 7. Save to localStorage for rewatch
        localStorage.setItem('activeSimulationPlaylist', JSON.stringify(shuffledPlaylist));

        // 8. Clean label extractor
        function extractClipLabel(url) {
            const id = url.split('id=')[1];
            const allIDs = {
                "1AnxolUWBeR0mPeAsVejZCrJPPoUjmsq1": "1F",
                "1TphWA59UA8uAAjirJmoR2_rxKK3Llm_O": "2F",
                "1XrBqpQiCaDNDgjGLOM4gxDUgpGcLWmoh": "3F",
                "1teKN8Q79fiw92bbY3CF-JVSWkrx6RwmW": "4F",
                "1tKyrGiQtjOgv8gorYBrwyuq4G_8nfER_": "5F",
                "1qI05N-wBY0ek75Y50v725U82VTTv0g8y": "6F",
                "1a85R8w3PW6iLbONUVkRpGs7LXlbzXj3p": "7F",
                "1_DsEW14o8DoKEX1Mk_o82rdisJjlWwLc": "8F",
                "1DEzWq03Tmws0t1WFmeidGxe-ZJCTJYnL": "9F",
                "1C1g92rz-HlGaauvL8T1UhTAmTNLJ4n3k": "10F",
                "1lBolPxj0naQ6EpZX8YN3OPNKVmkFD4mf": "1U",
                "12f1sK4ISp2Fk9ESo1T0YtkBjUj5MdLME": "2U",
                "1uqnNUgofWkRQLU5JbQoeVRZAmLGEpDpY": "3U",
                "1mSEkcDeYi8EpR7Y-pUVc2PqWi0fMAmh-": "4U",
                "1nsPdnCOabTdWIw_8rfXPR0wytzQK1UAC": "5U",
                "1PhDqKSaP5joyqWYHqo2Gc82eY0uXZjyH": "6U",
                "1_1S4NOTAFUs3YVYEHtLOxYs-gYF9JTJ0": "7U",
                "1BKHckPSzGETivAwchAOUYB2ocZGziHAu": "8U",
                "1XOVy1CMjCD9amtXPj0lVBnBjWj_trDkc": "9U",
                "16xFWsmgYiNAjGuvUq_8nXLSvfRidvG7H": "10U"
            };
            return allIDs[id] || id;
        }

        const videoOrderTrackingArray = shuffledPlaylist.map(url => extractClipLabel(url));

        let currentClipIndex = 0;
        const player = document.getElementById('simulationPlayer');
        const statusText = document.getElementById('statusBar');

        // 9. Playback controller
        function playNextClip() {
            if (currentClipIndex < shuffledPlaylist.length) {
                statusText.innerText = `Displaying Scenario ${currentClipIndex + 1} of ${shuffledPlaylist.length}`;
                player.src = shuffledPlaylist[currentClipIndex];
                player.load();
                player.play().catch(err => {
                    console.log("Awaiting user interaction.");
                });
            } else {
                statusText.innerText = "Simulation complete. Returning to evaluation system...";

                localStorage.setItem('activeSimulationPlaylist', JSON.stringify(shuffledPlaylist));

                const targetReturnURL = "https://qualtricsxm44bc3wkyn.qualtrics.com/jfe/form/SV_b8aFNKmGHwOuj5Q" +
                    `?videoOrder=${encodeURIComponent(videoOrderTrackingArray.join(','))}`;

                setTimeout(() => {
                    window.location.href = targetReturnURL;
                }, 1500);
            }
        }

        player.addEventListener('ended', () => {
            currentClipIndex++;
            playNextClip();
        });

        window.onload = () => {
            playNextClip();
        };
    </script>
</body>
</html>
